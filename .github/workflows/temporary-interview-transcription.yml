name: Temporary interview transcription

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temporary-interview-transcription
          fetch-depth: 0

      - id: check
        shell: bash
        run: |
          if [ -f transcripts/darya.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install faster-whisper

      - name: Reconstruct audio
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audio transcripts status
          wc -c audio_b64/darya_*.part | tee status/part-sizes.txt
          sha256sum audio_b64/darya_*.part | tee status/part-sha256.txt
          cat audio_b64/darya_*.part > audio/darya.b64
          base64 --decode --ignore-garbage audio/darya.b64 > audio/darya_fast.ogg
          sha256sum audio/darya_fast.ogg | tee status/audio-sha256.txt
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio/darya_fast.ogg | tee status/fast-duration.txt
          ffmpeg -y -loglevel error -i audio/darya_fast.ogg -filter:a 'atempo=0.5,atempo=0.5' -ar 16000 -ac 1 audio/darya.wav
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio/darya.wav | tee status/restored-duration.txt

      - name: Transcribe Russian speech
        if: steps.check.outputs.skip != 'true'
        run: |
          cat > /tmp/transcribe.py <<'PY'
          from faster_whisper import WhisperModel
          from pathlib import Path
          import json

          model = WhisperModel('base', device='cpu', compute_type='int8')
          segments, info = model.transcribe(
              'audio/darya.wav',
              language='ru',
              beam_size=5,
              vad_filter=True,
              vad_parameters=dict(min_silence_duration_ms=350),
              condition_on_previous_text=True,
          )
          rows = []
          lines = []
          for segment in segments:
              text = segment.text.strip()
              if text:
                  rows.append({'start': round(segment.start, 2), 'end': round(segment.end, 2), 'text': text})
                  lines.append(f'[{segment.start:08.2f} - {segment.end:08.2f}] {text}')
          Path('transcripts').mkdir(exist_ok=True)
          Path('transcripts/darya.txt').write_text('\n'.join(lines), encoding='utf-8')
          Path('transcripts/darya.json').write_text(json.dumps({'language': info.language, 'duration': info.duration, 'segments': rows}, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          python /tmp/transcribe.py

      - name: Commit transcript
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'interview-transcription-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add transcripts/darya.txt transcripts/darya.json status/
          git commit -m 'Add temporary transcript: darya'
          git push origin HEAD:temporary-interview-transcription
