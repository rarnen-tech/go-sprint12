name: Temporary interview transcription

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temporary-interview-transcription
          fetch-depth: 0

      - name: Diagnose audio links
        shell: bash
        run: |
          set +e
          mkdir -p audio status
          declare -A URLS=(
            [darya]='https://at.adobe.com/rEMgGP2YbHO9R0zV'
            [tatiana]='https://at.adobe.com/68azpp1QTcWDzcdw'
            [anna]='https://at.adobe.com/1TU2sbQxeWZCYHgR'
            [new_project]='https://at.adobe.com/q2qCi44eDXO4RbqG'
            [new_project_3]='https://at.adobe.com/t4qBBLAo0QLEf7FV'
          )
          for name in darya tatiana anna new_project new_project_3; do
            url="${URLS[$name]}"
            curl -L -D "status/${name}.headers" -w '\nhttp_code=%{http_code}\ncontent_type=%{content_type}\nurl_effective=%{url_effective}\nsize_download=%{size_download}\n' "$url" -o "audio/${name}.bin" > "status/${name}.curl" 2>&1
            file "audio/${name}.bin" > "status/${name}.file" 2>&1
            head -c 256 "audio/${name}.bin" | xxd > "status/${name}.head" 2>&1
          done
          git config user.name 'interview-transcription-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add status/
          git commit -m 'Add temporary audio link diagnostics' || true
          git push origin HEAD:temporary-interview-transcription
