name: Temporary interview transcription

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-reconstruction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temporary-interview-transcription
          fetch-depth: 0

      - name: Diagnose reconstruction
        shell: bash
        run: |
          set +e
          mkdir -p audio status
          wc -c audio_b64/darya_*.part > status/part-sizes.txt 2>&1
          sha256sum audio_b64/darya_*.part > status/part-sha256.txt 2>&1
          cat audio_b64/darya_*.part > audio/darya.b64
          echo "b64_size=$(wc -c < audio/darya.b64)" > status/decode.txt
          sha256sum audio/darya.b64 >> status/decode.txt
          base64 --decode --ignore-garbage audio/darya.b64 > audio/darya_fast.ogg 2>> status/decode.txt
          echo "base64_exit=$?" >> status/decode.txt
          echo "ogg_size=$(wc -c < audio/darya_fast.ogg)" >> status/decode.txt
          sha256sum audio/darya_fast.ogg >> status/decode.txt
          file audio/darya_fast.ogg >> status/decode.txt 2>&1
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio/darya_fast.ogg >> status/decode.txt 2>&1
          echo "ffprobe_exit=$?" >> status/decode.txt
          git config user.name 'interview-transcription-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add status/
          git commit -m 'Add embedded audio reconstruction diagnostics' || true
          git push origin HEAD:temporary-interview-transcription
